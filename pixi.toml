[workspace]
authors = ["Erik van Sebille <erikvansebille@gmail.com>"]
channels = ["https://prefix.dev/parcels", "conda-forge"]
name = "Loggerhead_Strandings"
platforms = ["osx-arm64", "linux-64", "win-64"]
version = "0.1.0"
preview = ["pixi-build"]

[tasks]
jupyter = "jupyter"

[activation.env]
JUPYTER_CONFIG_DIR = ".jupyter"

[dependencies]
parcels = ">=3.1.4"  # TODO update to v4 when available
ipykernel = ">=7.2.0,<8"
cmocean = ">=4.0.3,<5"
copernicusmarine = ">=2.3.0,<3"
setuptools = "*"
jupyter = ">=1.1.1,<2"
polars = ">=1.40.0,<2"
jupyterlab = ">=4.5.7,<5"
openpyxl = ">=3.1.5,<4"
